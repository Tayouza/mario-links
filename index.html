<body class="text-on-background min-h-screen flex flex-col font-body-lg">

        <div class="flex items-center gap-4">

                style="font-variation-settings: 'FILL' 0;">share</span>
        </div>
    </header>
    <main class="flex-grow flex flex-col items-center w-full max-w-container-max mx-auto px-margin-x pt-8 pb-16">
        <!-- Profile Header -->

                <img alt="Profile Picture"
                    class="w-28 h-28 rounded-full object-cover border-2 pulse-border border-primary-container"
                    src="/foto_perfil.jpg" />
            </div>
            <h1 class="font-headline-lg text-headline-lg text-on-surface mb-3 text-center">Mário Ferreira</h1>
            <div id="status-container"
                class="flex items-center gap-2 bg-surface-container-high rounded-full px-4 py-1.5 border border-surface-variant">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 pulse-dot"></div>
                <span id="status-text" class="font-label-caps text-label-caps text-on-surface uppercase">Online
                    Agora</span>
            </div>
        </div>
        <!-- Links Stack -->
        <div class="flex flex-col gap-stack-gap w-full">
            <!-- R6 ID Card -->
            <div
                class="glass-card rounded-lg p-4 flex items-center justify-between group transition-all duration-300 fade-in-up delay-1">
                <div class="flex items-center gap-4">
                    <img alt="R6 Logo"
                        class="w-8 h-8 object-contain opacity-80 group-hover:opacity-100 transition-opacity"
                        src="/r6.webp" />
                    <div>
                        <div class="font-label-caps text-label-caps text-on-surface-variant mb-1 uppercase">ID R6</div>
                        <div id="r6-id" class="font-headline-md text-[18px] text-on-surface">DPC_mariojfs7</div>
                    </div>
                </div>
                <button id="copy-btn"
                    class="bg-surface-container-highest hover:bg-primary-container hover:text-on-primary-container text-on-surface transition-colors rounded-full px-4 py-2 flex items-center gap-2 border border-outline-variant hover:border-transparent">
                    <span class="material-symbols-outlined text-[18px]">content_copy</span>
                    <span class="font-label-caps text-label-caps uppercase hidden sm:inline">Copiar</span>
                </button>
            </div>
            <!-- LIVEPIX -->
            <a class="glass-card rounded-lg p-4 flex items-center gap-4 group transition-all duration-300 fade-in-up delay-2"
                href="https://livepix.gg/mariojfs7" rel="noopener noreferrer" target="_blank">
                <div
                    class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant group-hover:border-[#00e676] transition-colors">
                    <div class="icon-mask w-5 h-5 text-secondary group-hover:text-[#00e676] transition-colors"
                        style="mask-image: url('https://cdn.simpleicons.org/pix'); -webkit-mask-image: url('https://cdn.simpleicons.org/pix');">
                    </div>
                </div>
                <span
                    class="font-body-lg text-body-lg font-semibold text-on-surface group-hover:text-primary-container transition-colors">
                    LivePIX
                </span>
            </a>
            <!-- Discord -->
            <a class="glass-card rounded-lg p-4 flex items-center gap-4 group transition-all duration-300 fade-in-up delay-2"
                href="https://discord.gg/8bbbn9dA" rel="noopener noreferrer" target="_blank">
                <div
                    class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant group-hover:border-[#5865F2] transition-colors">
                    <div class="icon-mask w-5 h-5 text-secondary group-hover:text-[#5865F2] transition-colors"
                        style="mask-image: url('https://cdn.simpleicons.org/discord'); -webkit-mask-image: url('https://cdn.simpleicons.org/discord');">
                    </div>
                </div>
                <span
                    class="font-body-lg text-body-lg font-semibold text-on-surface group-hover:text-primary-container transition-colors">Discord</span>
            </a>
            <!-- Grupo WhatsApp -->
            <a class="glass-card rounded-lg p-4 flex items-center gap-4 group transition-all duration-300 fade-in-up delay-3"
                href="https://chat.whatsapp.com/Kme3dceYP6A9Rpr1Kz7AcN" rel="noopener noreferrer" target="_blank">
                <div
                    class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant group-hover:border-[#25D366] transition-colors">
                    <div class="icon-mask w-5 h-5 text-secondary group-hover:text-[#25D366] transition-colors"

                    </div>
                </div>
                <span
                    class="font-body-lg text-body-lg font-semibold text-on-surface group-hover:text-primary-container transition-colors">Grupo
                    WhatsApp</span>
            </a>
            <!-- TikTok -->
            <a class="glass-card rounded-lg p-4 flex items-center gap-4 group transition-all duration-300 fade-in-up delay-4"
                href="https://vm.tiktok.com/ZS9sdwFbB/" rel="noopener noreferrer" target="_blank">
                <div
                    class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant group-hover:border-white transition-colors">
                    <div class="icon-mask w-5 h-5 text-secondary group-hover:text-white transition-colors"
                        style="mask-image: url('https://cdn.simpleicons.org/tiktok'); -webkit-mask-image: url('https://cdn.simpleicons.org/tiktok');">
                    </div>
                </div>
                <span
                    class="font-body-lg text-body-lg font-semibold text-on-surface group-hover:text-primary-container transition-colors">TikTok</span>
            </a>
            <!-- Twitch (Maintenance) -->
            <div
                class="glass-card rounded-lg p-4 flex items-center justify-between opacity-50 cursor-not-allowed disabled fade-in-up delay-5">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center border border-outline-variant">
                        <div class="icon-mask w-5 h-5 text-on-surface-variant"
                            style="mask-image: url('https://cdn.simpleicons.org/twitch'); -webkit-mask-image: url('https://cdn.simpleicons.org/twitch');">
                        </div>
                    </div>
                    <span class="font-body-lg text-body-lg font-semibold text-on-surface-variant">Twitch</span>
                </div>
                <span
                    class="bg-[#1A1A1A] px-3 py-1 rounded-full font-label-caps text-label-caps text-on-surface-variant border border-surface-variant uppercase tracking-wider">Em
                    breve</span>

        </div>
    </main>
    <!-- Footer -->
    <footer
        class="flex flex-col items-center gap-stack-gap w-full max-w-container-max mx-auto bg-transparent pb-8 fade-in-up"
        style="animation-delay: 300ms;">
        <div class="font-label-caps text-label-caps text-on-surface opacity-80 hover:opacity-100 transition-opacity">
            © 2026 DPC_MARIOJFS7
        </div>
        <div class="flex gap-4">
            <a class="font-label-caps text-label-caps text-on-secondary-container hover:text-primary transition-opacity opacity-80 hover:opacity-100 uppercase"
                href="#">Privacy</a>
            <a class="font-label-caps text-label-caps text-on-secondary-container hover:text-primary transition-opacity opacity-80 hover:opacity-100 uppercase"
                href="#">Terms</a>
        </div>
    </footer>
    <script>
        document.getElementById('copy-btn').addEventListener('click', function () {
            const r6Id = document.getElementById('r6-id').innerText;
            const btn = this;
            const btnText = btn.querySelector('span:last-child');
            const icon = btn.querySelector('span:first-child');

            navigator.clipboard.writeText(r6Id).then(() => {
                const originalText = btnText.innerText;
                const originalIcon = icon.innerText;

                btnText.innerText = 'Copiado!';
                icon.innerText = 'check';
                btn.classList.add('bg-green-600', 'text-white');
                btn.classList.remove('bg-surface-container-highest', 'text-on-surface');
                showToast('ID copiado com sucesso!');

                setTimeout(() => {
                    btnText.innerText = originalText;
                    icon.innerText = originalIcon;
                    btn.classList.remove('bg-green-600', 'text-white');
                    btn.classList.add('bg-surface-container-highest', 'text-on-surface');
                }, 2000);
            });
        });

        // Online Status Logic (13h - 20h GMT-3)
        function updateOnlineStatus() {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            const now = new Date();
            // Get UTC time
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            // Convert UTC to GMT-3
            const brTime = new Date(utc + (3600000 * -3));
            const hours = brTime.getHours();

            const isOnline = hours >= 13 && hours < 20;

            if (isOnline) {
                statusDot.classList.add('bg-green-500', 'pulse-dot');
                statusDot.classList.remove('bg-zinc-500');
                statusText.innerText = 'Online Agora';
            } else {
                statusDot.classList.remove('bg-green-500', 'pulse-dot');
                statusDot.classList.add('bg-zinc-500');
                statusText.innerText = 'Offline';
            }
        }

        updateOnlineStatus();
        setInterval(updateOnlineStatus, 60000); // Update every minute

        // Share functionality
        document.getElementById('share-btn').addEventListener('click', function () {
            const url = window.location.href;
            const btn = this;

            if (navigator.share) {
                navigator.share({
                    title: document.title,
                    url: url
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    const originalIcon = btn.innerText;
                    btn.innerText = 'check';
                    btn.classList.add('text-green-500');
                    showToast('Link copiado!');

                    setTimeout(() => {
                        btn.innerText = originalIcon;
                        btn.classList.remove('text-green-500');
                    }, 2000);
                });
            }
        });

        // Toast logic
        const toast = document.createElement('div');
        toast.className = 'toast font-label-caps text-label-caps';
        toast.innerHTML = '<span class="material-symbols-outlined text-[18px]">check_circle</span> <span id="toast-message">Copiado!</span>';
        document.body.appendChild(toast);

        function showToast(message) {
            document.getElementById('toast-message').innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Global export if needed
        window.showToast = showToast;
    </script>
</body>

</html>
